<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productivity Timer</title>
    <link rel="stylesheet" href="styles.css?v=8">
    <link rel="stylesheet" href="stats.css?v=8">
  </head>
  <body data-mode="pomodoro">
    <header class="topbar">
      <div class="brand">Productivity Timer</div>
      <div class="topbar-right">
        <div class="daily-summary" aria-live="polite">
          <span class="label-text">Today</span>
          <span class="daily-total-val" id="daily-total">000:00</span>
        </div>
        <details class="topbar-menu" id="topbar-menu">
          <summary class="topbar-btn" id="menu-toggle">Menu</summary>
          <div class="topbar-menu-panel" id="topbar-menu-panel">
            <button class="topbar-btn" id="stats-open" type="button">Stats</button>
            <button class="topbar-btn" id="history-open" type="button">History</button>
            <button class="topbar-btn" id="calendar-open" type="button">Calendar</button>
          </div>
        </details>
      </div>
    </header>

    <main class="main">
      <section class="timer-card" aria-labelledby="timer-title">
        <h1 id="timer-title" hidden>Study timer</h1>

        <div class="mode-tabs" role="tablist" aria-label="Timer modes">
          <button class="mode-tab active" type="button" data-mode="pomodoro" role="tab" aria-selected="true">
            Pomodoro
          </button>
          <button class="mode-tab" type="button" data-mode="short-break" role="tab" aria-selected="false">
            Short Break
          </button>
          <button class="mode-tab" type="button" data-mode="long-break" role="tab" aria-selected="false">
            Long Break
          </button>
          <button class="mode-tab" type="button" data-mode="stopwatch" role="tab" aria-selected="false">
            Stopwatch
          </button>
        </div>

        <div class="time-display" id="main-timer" aria-live="polite">025:00</div>

        <label class="duration-edit" for="duration-minutes">
          Countdown minutes
          <input id="duration-minutes" name="duration-minutes" type="number" min="1" max="500" value="25">
        </label>

        <div class="controls" aria-label="Timer controls">
          <button class="primary-btn" id="start-pause" type="button">START</button>
          <button class="secondary-btn" id="reset-timer" type="button">Reset</button>
          <button class="secondary-btn" id="end-session" type="button" hidden>End Session</button>
        </div>
      </section>

      <section class="activity-section" aria-labelledby="activity-title">
        <div class="section-header" id="activity-title">Session Type</div>

        <label class="mode-switch" for="chore-toggle">
          <input id="chore-toggle" type="checkbox">
          <span class="switch-track" aria-hidden="true"></span>
          <span>Chore mode</span>
        </label>

        <div class="chore-fields" id="chore-fields" hidden>
          <label for="chore-description">
            Description
            <input id="chore-description" type="text" autocomplete="off" placeholder="Pset, admin work, cooking">
          </label>

          <label for="chore-color">
            Calendar color
            <select id="chore-color">
              <option value="green">Green</option>
              <option value="yellow">Yellow</option>
              <option value="purple">Purple</option>
              <option value="orange">Orange</option>
              <option value="teal">Teal</option>
              <option value="pink">Pink</option>
              <option value="brown">Brown</option>
              <option value="gray">Gray</option>
            </select>
          </label>
        </div>
      </section>

      <section class="labels-section" aria-labelledby="labels-title">
        <div class="section-header" id="labels-title">Study Labels</div>

        <div class="selected-labels" id="selected-labels" aria-live="polite">
          <span class="none-placeholder">No labels selected</span>
        </div>

        <button class="label-action-btn" id="labels-toggle" type="button" aria-expanded="false" aria-controls="labels-dropdown">
          Choose labels
        </button>

        <div class="labels-dropdown" id="labels-dropdown" hidden>
          <div class="labels-list" id="labels-list">
            <button class="label-option" type="button" data-label="Physics">Physics</button>
            <button class="label-option" type="button" data-label="Math">Math</button>
            <button class="label-option" type="button" data-label="ML">ML</button>
            <button class="label-option" type="button" data-label="Coding">Coding</button>
            <button class="label-option" type="button" data-label="Research">Research</button>
            <button class="label-option" type="button" data-label="Writing">Writing</button>
          </div>

          <form class="add-label-form" id="add-label-form">
            <input id="new-label" name="new-label" type="text" autocomplete="off" placeholder="Add label" aria-label="New label">
            <button type="submit">Add</button>
          </form>
        </div>
      </section>
    </main>

    <section class="stats-overlay" id="stats-overlay" aria-labelledby="stats-title" role="dialog" aria-modal="true" hidden>
      <div class="stats-panel">
        <button class="stats-close" id="stats-close" type="button" aria-label="Close statistics">&times;</button>
        <h2 class="stats-title" id="stats-title">Statistics</h2>

        <div class="stats-filters">
          <label class="filter-group" for="stats-label">
            Label
            <select id="stats-label" name="stats-label">
              <option value="total">Total Study Time</option>
              <option value="Physics">Physics</option>
              <option value="Math">Math</option>
              <option value="ML">ML</option>
              <option value="Coding">Coding</option>
              <option value="Research">Research</option>
              <option value="Writing">Writing</option>
            </select>
          </label>

          <label class="filter-group" for="stats-period">
            Time Frame
            <select id="stats-period" name="stats-period">
              <option value="week">Past Week</option>
              <option value="month">Past Month</option>
              <option value="year">Past Year</option>
              <option value="all">All Time</option>
            </select>
          </label>
        </div>

        <div class="summary-cards">
          <article class="stat-card">
            <div class="stat-value" id="stats-hours">0.0</div>
            <div class="stat-label">Hours Studied</div>
          </article>
          <article class="stat-card">
            <div class="stat-value" id="stats-active-days">0</div>
            <div class="stat-label">Days Over 90 Min</div>
          </article>
          <article class="stat-card">
            <div class="stat-value" id="stats-streak">0</div>
            <div class="stat-label">Daily Streak</div>
          </article>
        </div>

        <h3 class="chart-title">Study Time</h3>
        <div class="chart-container">
          <svg class="chart-svg" id="stats-chart" viewBox="0 0 680 300" role="img" aria-labelledby="chart-description">
            <title id="chart-description">Study time chart</title>
            <line class="chart-grid" x1="40" y1="40" x2="640" y2="40"></line>
            <line class="chart-grid" x1="40" y1="110" x2="640" y2="110"></line>
            <line class="chart-grid" x1="40" y1="180" x2="640" y2="180"></line>
            <line class="chart-grid" x1="40" y1="250" x2="640" y2="250"></line>
            <rect class="chart-bar" x="78" y="225" width="42" height="25" rx="4"></rect>
            <rect class="chart-bar" x="160" y="190" width="42" height="60" rx="4"></rect>
            <rect class="chart-bar" x="242" y="150" width="42" height="100" rx="4"></rect>
            <rect class="chart-bar" x="324" y="120" width="42" height="130" rx="4"></rect>
            <rect class="chart-bar" x="406" y="172" width="42" height="78" rx="4"></rect>
            <rect class="chart-bar" x="488" y="96" width="42" height="154" rx="4"></rect>
            <rect class="chart-bar" x="570" y="135" width="42" height="115" rx="4"></rect>
            <text class="chart-axis-label" x="40" y="276">Past Week</text>
          </svg>
        </div>
      </div>
    </section>
    <script type="module" src="js/app.js?v=4"></script>
  </body>
</html>
